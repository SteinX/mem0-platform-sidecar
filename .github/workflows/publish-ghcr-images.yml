name: Publish GHCR Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Extra tag to publish for both images.
        required: true
        default: manual
        type: string
      mem0_ref:
        description: Upstream mem0ai/mem0 ref used for the dashboard overlay build.
        required: false
        default: main
        type: string
      push_latest:
        description: Also publish the latest tag during a manual run.
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  SIDECAR_IMAGE: ghcr.io/steinx/mem0-platform-sidecar
  DASHBOARD_IMAGE: ghcr.io/steinx/mem0-dashboard-sidecar

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish images
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout sidecar
        uses: actions/checkout@v4

      - name: Checkout upstream Mem0
        uses: actions/checkout@v4
        with:
          repository: mem0ai/mem0
          ref: ${{ inputs.mem0_ref || 'main' }}
          path: mem0-upstream

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run sidecar tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m pytest -q -p no:cacheprovider

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard dependencies
        working-directory: mem0-upstream/server/dashboard
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Apply dashboard overlay
        run: |
          python integrations/mem0-dashboard-overlay/scripts/apply-dashboard-overlay \
            mem0-upstream/server/dashboard

      - name: Verify dashboard overlay
        run: |
          python integrations/mem0-dashboard-overlay/scripts/verify-dashboard-overlay \
            mem0-upstream/server/dashboard

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sidecar image metadata
        id: sidecar-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SIDECAR_IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || inputs.push_latest }}
            type=sha,format=short,prefix=sha-

      - name: Dashboard image metadata
        id: dashboard-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' || inputs.push_latest }}
            type=sha,format=short,prefix=sha-

      - name: Build and push sidecar image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.sidecar-meta.outputs.tags }}
          labels: ${{ steps.sidecar-meta.outputs.labels }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,scope=sidecar,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: mem0-upstream/server/dashboard
          file: mem0-upstream/server/dashboard/Dockerfile
          push: true
          tags: ${{ steps.dashboard-meta.outputs.tags }}
          labels: ${{ steps.dashboard-meta.outputs.labels }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max
