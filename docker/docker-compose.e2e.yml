services:
  openai-stub:
    build:
      context: ../tests/e2e
      dockerfile: openai_stub.Dockerfile
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=2)"
      interval: 2s
      timeout: 3s
      retries: 30

  postgres:
    build:
      context: ../tests/e2e
      dockerfile: postgres.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: e2e-postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test "$(cat /proc/1/comm)" = postgres && pg_isready -q -d postgres -U postgres',
        ]
      interval: 2s
      timeout: 3s
      retries: 30

  mem0:
    build:
      context: ${MEM0_E2E_UPSTREAM_CONTEXT:?set MEM0_E2E_UPSTREAM_CONTEXT}
      dockerfile: server/dev.Dockerfile
    depends_on:
      openai-stub:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      APP_DB_NAME: mem0_app
      AUTH_DISABLED: "true"
      DASHBOARD_URL: http://localhost:3000
      JWT_SECRET: e2e-jwt-secret
      MEM0_TELEMETRY: "false"
      MEM0_OSS_LIST_FETCH_LIMIT: "5000"
      OPENAI_API_KEY: e2e-openai-key
      OPENAI_BASE_URL: http://openai-stub:8000/v1
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: e2e-postgres
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command:
      - sh
      - -c
      - "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2)"
      interval: 2s
      timeout: 3s
      retries: 90

  e2e-runner:
    build:
      context: ..
      dockerfile: tests/e2e/sidecar_e2e_runner.Dockerfile
    depends_on:
      mem0:
        condition: service_healthy
    environment:
      MEM0_E2E_BASE_URL: http://mem0:8000
      MEM0_E2E_PROJECT_ID: ${MEM0_E2E_PROJECT_ID:-sidecar-e2e}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - -m
      - pytest
      - tests/e2e/test_live_mem0_oss.py
      - -v
      - -rs
      - -m
      - "not adoption_e2e"
      - -p
      - no:cacheprovider

  e2e-adoption-runner:
    build:
      context: ..
      dockerfile: tests/e2e/sidecar_e2e_runner.Dockerfile
    depends_on:
      mem0:
        condition: service_healthy
    environment:
      MEM0_E2E_BASE_URL: http://mem0:8000
      MEM0_E2E_PROJECT_ID: ${MEM0_E2E_PROJECT_ID:-sidecar-e2e}
      MEM0_E2E_ADOPTION_ENABLED: "true"
      MEM0_SIDECAR_ALLOW_ADOPT_UNSCOPED: "true"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - -m
      - pytest
      - tests/e2e/test_live_mem0_oss.py
      - -v
      - -rs
      - -m
      - "adoption_e2e"
      - -p
      - no:cacheprovider

  dashboard:
    build:
      context: ${MEM0_E2E_DASHBOARD_CONTEXT:?set MEM0_E2E_DASHBOARD_CONTEXT}
      dockerfile: Dockerfile.e2e
    environment:
      AUTH_DISABLED: "true"
      NEXT_PUBLIC_API_URL: http://mem0:8000
      NEXT_PUBLIC_INSTANCE_NAME: Browser Smoke
      SIDECAR_INTERNAL_API_URL: http://mem0:8000
      SIDECAR_PROJECT_ID: ${MEM0_E2E_PROJECT_ID:-sidecar-e2e}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/dashboard/memories').then(r => { if (!r.ok) process.exit(1) })"
      interval: 3s
      timeout: 5s
      retries: 90

  browser:
    image: flaresolverr/flaresolverr:latest
    entrypoint: /usr/bin/chromium
    command:
      - --headless=new
      - --no-sandbox
      - --disable-dev-shm-usage
      - --disable-gpu
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --remote-allow-origins=*
      - --user-data-dir=/tmp/browser-smoke-profile
      - about:blank
    depends_on:
      dashboard:
        condition: service_healthy

  browser-smoke:
    build:
      context: ..
      dockerfile: tests/e2e/browser_smoke.Dockerfile
    environment:
      MEM0_E2E_BROWSER_CDP: http://127.0.0.1:9222
      MEM0_E2E_DASHBOARD_URL: http://dashboard:3000
    network_mode: service:browser

volumes:
  postgres-data:
