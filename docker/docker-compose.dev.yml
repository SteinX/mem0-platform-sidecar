services:
  sidecar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MEM0_SIDECAR_DATABASE_URL: ${MEM0_SIDECAR_DATABASE_URL:-sqlite:////data/mem0_sidecar.sqlite3}
      MEM0_SIDECAR_MEM0_BASE_URL: ${MEM0_SIDECAR_MEM0_BASE_URL:-http://host.docker.internal:8000}
      MEM0_SIDECAR_DEFAULT_PROJECT_ID: ${MEM0_SIDECAR_DEFAULT_PROJECT_ID:-default}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - sidecar-data:/data
    ports:
      - "8765:8765"

volumes:
  sidecar-data:
