services:
  sidecar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MEM0_SIDECAR_DATABASE_URL: ${MEM0_SIDECAR_DATABASE_URL:-sqlite:////data/mem0_sidecar.sqlite3}
      MEM0_SIDECAR_MEM0_BASE_URL: ${MEM0_SIDECAR_MEM0_BASE_URL:?Set MEM0_SIDECAR_MEM0_BASE_URL to the Mem0 OSS REST base URL reachable from this container}
      MEM0_SIDECAR_MEM0_API_KEY: ${MEM0_SIDECAR_MEM0_API_KEY:-}
      MEM0_SIDECAR_MEM0_API_KEY_HEADER_NAME: ${MEM0_SIDECAR_MEM0_API_KEY_HEADER_NAME:-X-API-Key}
      MEM0_SIDECAR_MEM0_API_KEY_PREFIX: ${MEM0_SIDECAR_MEM0_API_KEY_PREFIX:-}
      MEM0_SIDECAR_MEM0_EXTRA_HEADERS: ${MEM0_SIDECAR_MEM0_EXTRA_HEADERS:-{}}
      MEM0_SIDECAR_MEM0_REQUEST_TIMEOUT_SECONDS: ${MEM0_SIDECAR_MEM0_REQUEST_TIMEOUT_SECONDS:-30}
      MEM0_SIDECAR_MEM0_CONNECT_TIMEOUT_SECONDS: ${MEM0_SIDECAR_MEM0_CONNECT_TIMEOUT_SECONDS:-30}
      MEM0_SIDECAR_MEM0_VERIFY_TLS: ${MEM0_SIDECAR_MEM0_VERIFY_TLS:-true}
      MEM0_SIDECAR_MEM0_CA_BUNDLE: ${MEM0_SIDECAR_MEM0_CA_BUNDLE:-}
      MEM0_SIDECAR_MEM0_MEMORIES_PATH: ${MEM0_SIDECAR_MEM0_MEMORIES_PATH:-/memories}
      MEM0_SIDECAR_MEM0_SEARCH_PATH: ${MEM0_SIDECAR_MEM0_SEARCH_PATH:-/search}
      MEM0_SIDECAR_DEFAULT_PROJECT_ID: ${MEM0_SIDECAR_DEFAULT_PROJECT_ID:-default}
      MEM0_SIDECAR_LOG_LEVEL: ${MEM0_SIDECAR_LOG_LEVEL:-INFO}
      MEM0_SIDECAR_LOG_FORMAT: ${MEM0_SIDECAR_LOG_FORMAT:-json}
      MEM0_SIDECAR_REQUEST_ID_HEADER: ${MEM0_SIDECAR_REQUEST_ID_HEADER:-X-Request-ID}
    volumes:
      - sidecar-data:/data
    ports:
      - "8765:8765"

volumes:
  sidecar-data:
